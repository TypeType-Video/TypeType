name: Documentation
description: Report a docs problem or suggest an improvement
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping the docs get better for everyone :p"
  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: input
    id: where
    attributes:
      label: Page or link
      placeholder: https://...
    validations:
      required: false
