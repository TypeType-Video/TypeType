services:
  typetype:
    image: ${TYPETYPE_WEB_IMAGE:-ghcr.io/typetype-video/typetype:latest}
    ports:
      - "${HOST_PORT_WEB:-8082}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      typetype-server:
        condition: service_healthy
    restart: unless-stopped
  typetype-server:
    image: ${TYPETYPE_SERVER_IMAGE:-ghcr.io/typetype-video/typetype-server:latest}
    ports:
      - "${HOST_BIND_SERVER:-127.0.0.1}:${HOST_PORT_SERVER:-8080}:8080"
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8082,http://127.0.0.1:8082,http://localhost:5173,http://127.0.0.1:5173}
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/${POSTGRES_DB:-typetype}}
      DATABASE_USER: ${DATABASE_USER:-${POSTGRES_USER:-typetype}}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-${POSTGRES_PASSWORD:-typetype}}
      DRAGONFLY_URL: ${DRAGONFLY_URL:-redis://dragonfly:6379}
      GITHUB_REPO: ${GITHUB_REPO:-TypeType-Video/TypeType}
      GITHUB_ISSUE_TEMPLATE: ${GITHUB_ISSUE_TEMPLATE:-bug_report_backend.md}
      DOWNLOADER_SERVICE_URL: http://typetype-downloader:18093
      YOUTUBE_OUTBOUND_PROXY_URL: ${YOUTUBE_OUTBOUND_PROXY_URL:-}
      YOUTUBE_REMOTE_LOGIN_ENABLED: ${YOUTUBE_REMOTE_LOGIN_ENABLED:-true}
      YOUTUBE_REMOTE_LOGIN_SERVICE_URL: http://typetype-token:8081
      YOUTUBE_REMOTE_LOGIN_CALLBACK_BASE_URL: http://typetype-server:8080
      YOUTUBE_REMOTE_LOGIN_INTERNAL_TOKEN: ${YOUTUBE_REMOTE_LOGIN_INTERNAL_TOKEN:-}
      YOUTUBE_REMOTE_LOGIN_INTERNAL_TOKEN_FILE: /run/typetype-secrets/youtube_remote_login_internal_token
      YOUTUBE_SESSION_ENCRYPTION_KEY_FILE: /run/typetype-secrets/youtube_session_encryption_key
      YOUTUBE_REMOTE_LOGIN_TTL_MS: ${YOUTUBE_REMOTE_LOGIN_TTL_MS:-480000}
      YOUTUBE_REMOTE_LOGIN_MAX_SESSIONS: ${YOUTUBE_REMOTE_LOGIN_MAX_SESSIONS:-2}
      YOUTUBE_REMOTE_LOGIN_MAX_FRAME_BYTES: ${YOUTUBE_REMOTE_LOGIN_MAX_FRAME_BYTES:-524288}
    volumes:
      - typetype_secrets:/run/typetype-secrets:ro
    depends_on:
      typetype-secrets:
        condition: service_completed_successfully
      postgres-init:
        condition: service_completed_successfully
      dragonfly:
        condition: service_healthy
      typetype-token:
        condition: service_healthy
      typetype-downloader:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health"]
    restart: unless-stopped

  typetype-secrets:
    image: busybox:1.37
    command:
      - /bin/sh
      - -ec
      - |
        generate_secret() {
          dd if=/dev/urandom bs=48 count=1 2>/dev/null | base64 | tr '+/' '-_' | tr -d '=\n'
        }
        ensure_secret() {
          file="$$1"
          value="$$2"
          placeholder="$$3"
          legacy_placeholder="$$4"
          if [ -n "$$value" ] && [ "$$value" != "$$placeholder" ] && [ "$$value" != "$$legacy_placeholder" ]; then
            printf '%s' "$$value" > "$$file"
          elif [ ! -s "$$file" ]; then
            generate_secret > "$$file"
          fi
          chmod 0444 "$$file"
        }
        mkdir -p /run/typetype-secrets
        ensure_secret /run/typetype-secrets/youtube_remote_login_internal_token "$$YOUTUBE_REMOTE_LOGIN_INTERNAL_TOKEN" SET_ME_YOUTUBE_REMOTE_LOGIN_INTERNAL_TOKEN SET_ME_SHARED_SECRET
        ensure_secret /run/typetype-secrets/youtube_session_encryption_key "$$YOUTUBE_SESSION_ENCRYPTION_KEY" SET_ME_YOUTUBE_SESSION_ENCRYPTION_KEY SET_ME_SHARED_SECRET
    environment:
      YOUTUBE_REMOTE_LOGIN_INTERNAL_TOKEN: ${YOUTUBE_REMOTE_LOGIN_INTERNAL_TOKEN:-}
      YOUTUBE_SESSION_ENCRYPTION_KEY: ${YOUTUBE_SESSION_ENCRYPTION_KEY:-}
    volumes:
      - typetype_secrets:/run/typetype-secrets
    restart: "no"

  typetype-downloader:
    image: ${TYPETYPE_DOWNLOADER_IMAGE:-ghcr.io/typetype-video/typetype-downloader:latest}
    environment:
      HTTP_PORT: "18093"
      PUBLIC_BASE_URL: /api/downloader
      TYPETYPE_API_BASE: http://typetype-server:8080
      DB_URL: ${DB_URL:-postgres://${POSTGRES_USER:-typetype}:${POSTGRES_PASSWORD:-typetype}@postgres:5432/typetype_downloader?sslmode=disable}
      REDIS_HOST: dragonfly
      REDIS_PORT: "6379"
      REDIS_QUEUE_KEY: downloader:queue
      MAX_CONCURRENT_WORKERS: "2"
      MAX_QUEUE_SIZE: "100"
      JOB_TTL_SECONDS: "600"
      DOWNLOAD_WORKERS: "8"
      DOWNLOAD_CHUNK_SIZE: "10485760"
      DOWNLOAD_RANGE_MODE: query
      MUXER: avformat
      STORAGE_BACKEND: s3
      S3_ENDPOINT: http://garage:3900
      S3_PUBLIC_ENDPOINT: http://garage:3900
      S3_REGION: garage
      S3_BUCKET: typetype-downloads
      S3_ACCESS_KEY: ${DOWNLOADER_S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${DOWNLOADER_S3_SECRET_KEY:-}
      S3_ARTIFACT_TTL_SECONDS: "7200"
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      dragonfly:
        condition: service_healthy
      garage:
        condition: service_started
      typetype-token:
        condition: service_healthy
    restart: unless-stopped

  typetype-token:
    image: ${TYPETYPE_TOKEN_IMAGE:-ghcr.io/typetype-video/typetype-token:latest}
    ports:
      - "${HOST_BIND_TOKEN:-127.0.0.1}:${HOST_PORT_TOKEN:-8081}:8081"
    init: true
    ipc: host
    environment:
      NODE_ENV: production
      YOUTUBE_OUTBOUND_PROXY_URL: ${YOUTUBE_OUTBOUND_PROXY_URL:-}
      YOUTUBE_REMOTE_LOGIN_ENABLED: ${YOUTUBE_REMOTE_LOGIN_ENABLED:-true}
      YOUTUBE_REMOTE_LOGIN_INTERNAL_TOKEN: ${YOUTUBE_REMOTE_LOGIN_INTERNAL_TOKEN:-}
      YOUTUBE_REMOTE_LOGIN_INTERNAL_TOKEN_FILE: /run/typetype-secrets/youtube_remote_login_internal_token
      YOUTUBE_REMOTE_LOGIN_CALLBACK_ORIGIN: ${YOUTUBE_REMOTE_LOGIN_CALLBACK_ORIGIN:-http://typetype-server:8080}
      YOUTUBE_REMOTE_LOGIN_MAX_SESSIONS: ${YOUTUBE_REMOTE_LOGIN_MAX_SESSIONS:-2}
      YOUTUBE_REMOTE_LOGIN_FRAME_FPS: ${YOUTUBE_REMOTE_LOGIN_FRAME_FPS:-10}
      YOUTUBE_REMOTE_LOGIN_MAX_FRAME_BYTES: ${YOUTUBE_REMOTE_LOGIN_MAX_FRAME_BYTES:-524288}
    volumes:
      - typetype_secrets:/run/typetype-secrets:ro
    depends_on:
      typetype-secrets:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8081/health > /dev/null"]
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-typetype}
      POSTGRES_USER: ${POSTGRES_USER:-typetype}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-typetype}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 30
    restart: unless-stopped

  postgres-init:
    image: postgres:17
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-typetype}
      POSTGRES_USER: ${POSTGRES_USER:-typetype}
      PGPASSWORD: ${POSTGRES_PASSWORD:-typetype}
    command:
      - /bin/sh
      - -ec
      - |
        until pg_isready -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"; do sleep 1; done
        EXISTS=$$(psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -tAc "SELECT 1 FROM pg_database WHERE datname='typetype_downloader'")
        if [ "$$EXISTS" != "1" ]; then
          psql -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -c "CREATE DATABASE typetype_downloader"
        fi
    restart: "no"

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    ulimits:
      memlock: -1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    restart: unless-stopped
  garage:
    image: dxflrs/garage:v2.2.0
    ports:
      - "${HOST_BIND_GARAGE_S3:-127.0.0.1}:${HOST_PORT_GARAGE_S3:-3900}:3900"
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-}
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    restart: unless-stopped
volumes:
  postgres_data:
  typetype_secrets:
  garage_meta:
  garage_data:
